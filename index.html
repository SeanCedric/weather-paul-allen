<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Paul Allen's Mix Checker</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
    }
    button {
      background: #007bff;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <h1>🌡️ Paul Allen's Mix Checker</h1>
  <p>Klik om de buitentemperatuur op jouw locatie te checken!</p>

  <button id="checkBtn">Check buitentemperatuur</button>

  <div id="result"></div>
</body>
</html>
